<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CashRecovery PRO | CEO Hybrid Model</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #040712; color: white; font-family: sans-serif; text-align: center; }
        .glass { background: #111827; border: 2px solid #374151; padding: 30px; border-radius: 15px; max-width: 500px; margin: 20px auto; }
        .red-btn { background: #ef4444; color: white; border: none; padding: 18px; border-radius: 12px; font-weight: bold; cursor: pointer; width: 100%; font-size: 18px; transition: 0.2s; text-decoration: none; display: block; margin-top: 15px; }
        .white-btn { background: white; color: black; border: none; padding: 18px; border-radius: 12px; font-weight: bold; cursor: pointer; width: 100%; font-size: 18px; transition: 0.2s; display: block; margin-top: 15px; text-decoration: none; }
        .hidden { display: none; }
        .big-number { font-size: 50px; font-weight: 900; margin: 0; }
        .table-row { display: flex; justify-content: space-between; padding: 15px; border-bottom: 1px solid #374151; font-size: 14px; }
    </style>
</head>
<body class="p-6">

    <h1 style="color: #f43f5e; font-weight: 900; margin-top: 40px;">CashRecovery <span style="color: white">PRO</span></h1>

    <!-- LANDING PAGE -->
    <div id="landing-page">
        <div class="glass" style="margin-top: 50px;">
            <h2>Reclaim Your Lost Profit</h2>
            <p style="color: #9ca3af">Most owners find $5,240 in "lost profit" on their first scan.</p>
            <button class="red-btn" onclick="openApp(false)">LAUNCH SCANNER</button>
            <button class="white-btn" onclick="openApp(true)">TRY LIVE DEMO</button>
        </div>
    </div>

    <!-- APP WORKSPACE -->
    <div id="app-page" class="hidden">
        
        <!-- TOP STATS -->
        <div style="display: flex; gap: 15px; justify-content: center; margin-bottom: 20px;">
            <div class="glass" style="flex: 1; margin: 0; padding: 20px;">
                <p style="font-size: 10px; font-weight: bold; color: #ef4444;">LATE FEES FOUND</p>
                <div class="big-number" id="fees-stat">$0</div>
            </div>
            <div class="glass" style="flex: 1; margin: 0; padding: 20px;">
                <p style="font-size: 10px; font-weight: bold; color: #9ca3af;">TOTAL RECOVERY</p>
                <div class="big-number" id="total-stat">$0</div>
            </div>
        </div>

        <!-- LIST AREA -->
        <div class="glass" style="max-width: 600px; padding: 0; overflow: hidden; text-align: left;">
            <div style="background: #1f2937; padding: 10px 20px; font-size: 10px; font-weight: bold; color: #6b7280; display: flex; justify-content: space-between;">
                <span>CLIENT NAME</span>
                <span>STATUS</span>
            </div>
            <div id="data-list">
                <p style="padding: 40px; text-align: center; color: #4b5563;">No data yet. Run scan or demo.</p>
            </div>
        </div>

        <!-- HYBRID SALES BUTTONS -->
        <div style="margin-top: 30px;">
            <h3 style="margin-bottom: 20px;">Ready to collect this cash?</h3>
            <!-- YOUR HYBRID LINK -->
            <a href="https://buy.stripe.com/test_aFafZgaphapleHw7lt0Fi0f" target="_blank" class="red-btn" style="max-width: 400px; margin-left: auto; margin-right: auto;">BOOK $1,000 RECOVERY SESSION</a>
            <a href="https://buy.stripe.com/test_aFafZgaphapleHw7lt0Fi0f" target="_blank" class="white-btn" style="max-width: 400px; margin-left: auto; margin-right: auto; opacity: 0.7;">GET SOFTWARE LICENSE — $99/mo</a>
        </div>

        <button onclick="location.reload()" style="background: none; border: none; color: #4b5563; margin-top: 30px; cursor: pointer; text-decoration: underline;">Exit to Dashboard</button>
    </div>

    <script>
        function openApp(isDemo) {
            document.getElementById('landing-page').classList.add('hidden');
            document.getElementById('app-page').classList.remove('hidden');

            if (isDemo) {
                // INJECT REAL DEMO DATA INSTANTLY
                document.getElementById('fees-stat').innerText = "$2,215";
                document.getElementById('total-stat').innerText = "$29,715";
                
                var html = '';
                var clients = [
                    { name: "Acme Digital", status: "45 Days Overdue" },
                    { name: "Stellar Agency", status: "12 Days Overdue" },
                    { name: "Nexus Global", status: "84 Days Overdue" }
                ];

                for (var i = 0; i < clients.length; i++) {
                    html += '<div class="table-row"><b>' + clients[i].name + '</b><span style="color: #ef4444">' + clients[i].status + '</span></div>';
                }
                document.getElementById('data-list').innerHTML = html;
            }
        }
    </script>
</body>
</html>
